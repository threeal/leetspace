name: 3567. Minimum Absolute Difference in Sliding Submatrix

types:
  inputs:
    grid: std::vector<std::vector<int>>
    k: int
  output: std::vector<std::vector<int>>

solutions:
  cpp:
    function: minAbsDiff

test_cases:
  example_1:
    inputs:
      grid:
        - [1, 8]
        - [3, -2]
      k: 2
    output:
      - [2]

  example_2:
    inputs:
      grid:
        - [3, -1]
      k: 1
    output:
      - [0, 0]

  example_3:
    inputs:
      grid:
        - [1, -2, 3]
        - [2, 3, 5]
      k: 2
    output:
      - [1, 2]
