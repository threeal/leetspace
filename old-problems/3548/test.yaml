name: 3548. Equal Sum Grid Partition II

types:
  inputs:
    grid: std::vector<std::vector<int>>
  output: bool

solutions:
  cpp:
    function: canPartitionGrid

test_cases:
  example_1:
    inputs:
      grid:
        - [1, 4]
        - [2, 3]
    output: true

  example_2:
    inputs:
      grid:
        - [1, 2]
        - [3, 4]
    output: true

  example_3:
    inputs:
      grid:
        - [1, 2, 4]
        - [2, 3, 5]
    output: false

  example_4:
    inputs:
      grid:
        - [4, 1, 8]
        - [3, 2, 6]
    output: false
