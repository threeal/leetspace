name: 3852. Smallest Pair With Different Frequencie

types:
  inputs:
    nums: std::vector<int>
  output: std::vector<int>

solutions:
  cpp:
    function: minDistinctFreqPair

test_cases:
  example_1:
    inputs:
      nums: [1, 1, 2, 2, 3, 4]
    output: [1, 3]

  example_2:
    inputs:
      nums: [1, 5]
    output: [-1, -1]

  example_3:
    inputs:
      nums: [7]
    output: [-1, -1]
