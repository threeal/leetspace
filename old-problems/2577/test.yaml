name: 2577. Minimum Time to Visit a Cell In a Grid

types:
  inputs:
    grid: std::vector<std::vector<int>>
  output: int

solutions:
  cpp:
    function: minimumTime

test_cases:
  example_1:
    inputs:
      grid:
        - [0, 1, 3, 2]
        - [5, 1, 2, 5]
        - [4, 3, 8, 6]
    output: 7

  example_2:
    inputs:
      grid:
        - [0, 2, 4]
        - [3, 2, 1]
        - [1, 0, 4]
    output: -1
