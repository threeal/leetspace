name: 2946. Matrix Similarity After Cyclic Shifts

types:
  inputs:
    mat: std::vector<std::vector<int>>
    k: int
  output: bool

solutions:
  c:
  cpp:
    function: areSimilar

test_cases:
  example_1:
    inputs:
      mat:
        - [1, 2, 3]
        - [4, 5, 6]
        - [7, 8, 9]
      k: 4
    output: false

  example_2:
    inputs:
      mat:
        - [1, 2, 1, 2]
        - [5, 5, 5, 5]
        - [6, 3, 6, 3]
      k: 2
    output: true

  example_3:
    inputs:
      mat:
        - [2, 2]
        - [2, 2]
      k: 3
    output: true

  test_case_828:
    inputs:
      mat:
        - [9, 10, 10, 6, 6, 8, 10, 7, 10, 9]
        - [10, 6, 1, 10, 10, 5, 7, 9, 9, 2]
        - [8, 5, 8, 3, 5, 2, 2, 9, 7, 10]
      k: 20
    output: true
