name: 874. Walking Robot Simulation

types:
  inputs:
    commands: std::vector<int>
    obstacles: std::vector<std::vector<int>>
  output: int

solutions:
  cpp:
    function: robotSim

test_cases:
  example_1:
    inputs:
      commands: [4, -1, 3]
      obstacles: []
    output: 25

  example_2:
    inputs:
      commands: [4, -1, 4, -2, 4]
      obstacles: [[2, 4]]
    output: 65

  example_3:
    inputs:
      commands: [6, -1, -1, 6]
      obstacles: []
    output: 36

  test_case_20:
    inputs:
      commands: [-2, 8, 3, 7, -1]
      obstacles: [
        [-4, -1], [1, -1], [1, 4], [5, 0], [4, 5], [-2, -1], [2, -5], [5, 1],
        [-3, -1], [5, -3]]
    output: 324
