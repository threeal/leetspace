name: 3661. Maximum Walls Destroyed by Robots

types:
  inputs:
    robots: std::vector<int>
    distance: std::vector<int>
    walls: std::vector<int>
  output: int

solutions:
  cpp:
    function: maxWalls

test_cases:
  example_1:
    inputs:
      robots: [4]
      distance: [3]
      walls: [1, 10]
    output: 1

  example_2:
    inputs:
      robots: [10, 2]
      distance: [5, 1]
      walls: [5, 2, 7]
    output: 3

  example_3:
    inputs:
      robots: [1, 2]
      distance: [100, 1]
      walls: [10]
    output: 0
