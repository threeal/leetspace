name: 3474. Lexicographically Smallest Generated String

types:
  inputs:
    str1: std::string
    str2: std::string
  output: std::string

solutions:
  cpp:
    function: generateString

test_cases:
  example_1:
    inputs:
      str1: TFTF
      str2: ab
    output: ababa

  example_2:
    inputs:
      str1: TFTF
      str2: abc
    output: ""

  example_3:
    inputs:
      str1: F
      str2: d
    output: a
