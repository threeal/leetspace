name: 3600. Maximize Spanning Tree Stability with Upgrades

types:
  inputs:
    n: int
    edges: std::vector<std::vector<int>>
    k: int
  output: int

solutions:
  cpp:
    function: maxStability

test_cases:
  example_1:
    inputs:
      n: 3
      edges: [[0, 1, 2, 1], [1, 2, 3, 0]]
      k: 1
    output: 2

  example_2:
    inputs:
      n: 3
      edges: [[0, 1, 4, 0], [1, 2, 3, 0], [0, 2, 1, 0]]
      k: 2
    output: 6

  example_3:
    inputs:
      n: 3
      edges: [[0, 1, 1, 1], [1, 2, 1, 1], [2, 0, 1, 1]]
      k: 0
    output: -1
