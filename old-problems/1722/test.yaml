name: 1722. Minimize Hamming Distance After Swap Operations

types:
  inputs:
    source: std::vector<int>
    target: std::vector<int>
    allowedSwaps: std::vector<std::vector<int>>
  output: int

solutions:
  cpp:
    function: minimumHammingDistance

test_cases:
  example_1:
    inputs:
      source: [1, 2, 3, 4]
      target: [2, 1, 4, 5]
      allowedSwaps: [[0, 1], [2, 3]]
    output: 1

  example_2:
    inputs:
      source: [1, 2, 3, 4]
      target: [1, 3, 2, 4]
      allowedSwaps: []
    output: 2

  example_2:
    inputs:
      source: [5, 1, 2, 4, 3]
      target: [1, 5, 4, 2, 3]
      allowedSwaps: [[0, 4], [4, 2], [1, 3], [1, 4]]
    output: 0
