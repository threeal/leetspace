name: 3488. Closest Equal Element Queries

types:
  inputs:
    nums: std::vector<int>
    queries: std::vector<int>
  output: std::vector<int>

solutions:
  cpp:
    function: solveQueries

test_cases:
  example_1:
    inputs:
      nums: [1, 3, 1, 4, 1, 3, 2]
      queries: [0, 3, 5]
    output: [2, -1, 3]

  example_2:
    inputs:
      nums: [1, 2, 3, 4]
      queries: [0, 1, 2, 3]
    output: [-1, -1, -1, -1]
