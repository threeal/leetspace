name: 2573. Find the String with LCP

types:
  inputs:
    lcp: std::vector<std::vector<int>>
  output: std::string

solutions:
  cpp:
    function: findTheString

test_cases:
  example_1:
    inputs:
      lcp:
        - [4, 0, 2, 0]
        - [0, 3, 0, 1]
        - [2, 0, 2, 0]
        - [0, 1, 0, 1]
    output: abab

  example_2:
    inputs:
      lcp:
        - [4, 3, 2, 1]
        - [3, 3, 2, 1]
        - [2, 2, 2, 1]
        - [1, 1, 1, 1]
    output: aaaa

  example_3:
    inputs:
      lcp:
        - [4, 3, 2, 1]
        - [3, 3, 2, 1]
        - [2, 2, 2, 1]
        - [1, 1, 1, 3]
    output: ""
