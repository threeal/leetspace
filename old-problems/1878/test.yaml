name: 1878. Get Biggest Three Rhombus Sums in a Grid

types:
  inputs:
    grid: std::vector<std::vector<int>>
  output: std::vector<int>

solutions:
  cpp:
    function: getBiggestThree

test_cases:
  example_1:
    inputs:
      grid:
        - [3, 4, 5, 1, 3]
        - [3, 3, 4, 2, 3]
        - [20, 30, 200, 40, 10]
        - [1, 5, 5, 4, 1]
        - [4, 3, 2, 2, 5]
    output: [228, 216, 211]

  example_2:
    inputs:
      grid:
        - [1, 2, 3]
        - [4, 5, 6]
        - [7, 8, 9]
    output: [20, 9, 8]

  example_3:
    inputs:
      grid: [[7, 7, 7]]
    output: [7]
