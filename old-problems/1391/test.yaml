name: 1391. Check if There is a Valid Path in a Grid

types:
  inputs:
    grid: std::vector<std::vector<int>>
  output: bool

solutions:
  cpp:
    function: hasValidPath

test_cases:
  example_1:
    inputs:
      grid:
        - [2, 4, 3]
        - [6, 5, 2]
    output: true

  example_2:
    inputs:
      grid:
        - [1, 2, 1]
        - [1, 2, 1]
    output: false

  example_3:
    inputs:
      grid:
        - [1, 1, 2]
    output: false
