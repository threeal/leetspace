name: 2515. Shortest Distance to Target String in a Circular Array

types:
  inputs:
    words: std::vector<std::string>
    target: std::string
    startIndex: int
  output: int

solutions:
  cpp:
    function: closestTarget

test_cases:
  example_1:
    inputs:
      words: [hello, i, am, leetcode, hello]
      target: hello
      startIndex: 1
    output: 1

  example_2:
    inputs:
      words: [a, b, leetcode]
      target: leetcode
      startIndex: 0
    output: 1

  example_3:
    inputs:
      words: [i, eat, leetcode]
      target: ate
      startIndex: 0
    output: -1
