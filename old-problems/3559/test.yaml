name: 3559. Number of Ways to Assign Edge Weights II

types:
  inputs:
    edges: std::vector<std::vector<int>>
    queries: std::vector<std::vector<int>>
  output: std::vector<int>

solutions:
  cpp:
    function: assignEdgeWeights

test_cases:
  example_1:
    inputs:
      edges: [[1, 2]]
      queries: [[1, 1], [1, 2]]
    output: [0, 1]

  example_2:
    inputs:
      edges: [[1, 2], [1, 3], [3, 4], [3, 5]]
      queries: [[1, 4], [3, 4], [2, 5]]
    output: [2, 1, 4]
