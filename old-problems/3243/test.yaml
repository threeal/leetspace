name: 3243. Shortest Distance After Road Addition Queries I

types:
  inputs:
    n: int
    queries: std::vector<std::vector<int>>
  output: std::vector<int>

solutions:
  cpp:
    function: shortestDistanceAfterQueries

test_cases:
  example_1:
    inputs:
      n: 5
      queries: [[2, 4], [0, 2], [0, 4]]
